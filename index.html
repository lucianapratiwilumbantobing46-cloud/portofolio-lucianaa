<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card-portfolio {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            padding: 30px 20px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #eee;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .btn-social i {
            position: absolute;
            left: 20px;
            font-size: 1.3rem;
        }

        .btn-social:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white;
        }

        /* Warna Ikon & Tombol */
        .ig-color { background-color: #E1306C; color: white; }
        .tt-color { background-color: #000000; color: white; }
        .wa-color { background-color: #25D366; color: white; }
    </style>
</head>
<body>

<div class="card-portfolio">
    <img src="profil.jpg.jpeg" alt="Profile" class="profile-img">
    
    <h2 class="fw-bold h4 mb-1">Luciana</h2>
    <p class="text-muted small mb-4"></p>

    <div class="d-grid">
        <a href="https://www.instagram.com/anaa.tbg?igsh=ZDV5aHN4Nm41ODJu" target="_blank" class="btn-social ig-color">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://www.tiktok.com/@anaa.tbg?_r=1&_t=ZS-95OUUh87d0H" target="_blank" class="btn-social tt-color">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://wa.me/6282117387381?text=Halo,%20Luciana%20" target="_blank" class="btn-social wa-color">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <p class="mt-4 text-secondary" style="font-size: 12px;">
        &copy; 2026 Portofolio Luci. All rights reserved.
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
